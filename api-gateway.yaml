spring:
  application:
    name: api-gateway

 spring:
  cloud:
    gateway:
      webflux:
        routes:
          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
              - Path=/user/**

          - id: order-service
            uri: lb://ORDER-SERVICE
            predicates:
              - Path=/order/**

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
